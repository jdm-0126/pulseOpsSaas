version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulseops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulseops"]
      interval: 5s
      retries: 10
    networks:
      - pulseops

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    networks:
      - pulseops

  api:
    build:
      context: .
      target: api
    env_file: .env
    environment:
      DATABASE_URL: postgres://pulse:pulse@postgres:5432/pulseops
      REDIS_URL: redis://redis:6379
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pulseops

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: postgres://pulse:pulse@postgres:5432/pulseops
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pulseops

  web:
    build:
      context: .
      target: web
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - pulseops

volumes:
  postgres_data:

networks:
  pulseops:
    driver: bridge
