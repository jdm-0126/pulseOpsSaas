server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the api service
    location /api/ {
        proxy_pass http://api:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
